# 以 patch: 开头，后面的内容都需要缩进
patch:
  menu/page_size: 6 # 修改候选词数量
  
  # 在 corrector 之前插入模糊音 filter
  engine/filters/@before 0:
      lua_filter@*say_it_right_filter  # 模糊音正确拼音提示（必须在 corrector 之前）
  
  # 模糊音 filter 配置
  say_it_right_filter:
    keep_original_comment: true           # 保留原始拼音注释，兼容 corrector（推荐）
    style: "{pinyin}"               # 注释外层样式
    single_char_format: "{pinyin}"     # 单字格式（可用占位符：{char} {pinyin}）
    multi_char_format: "{char}({pinyin})" # 多字格式（可用占位符：{char} {pinyin}）
    separator: " "                      # 多个注释的连接符（默认空格）
    # 实际显示效果示例：
    #   单字：〔chi〕
    #   多字：〔吃=chi 饭=fan〕
    #   自定义 separator: "、"时：〔吃=chi、饭=fan〕
    # 说明：
    # - 有模糊音时：只显示模糊音提示（如 〔吃=chi〕）
    # - 无模糊音但输入不匹配时：保留原始注释供 corrector 显示错音提示
    # - 完全匹配时：keep_original_comment=true 保留注释，false 清空注释
  
  # 追加模糊音规则
  ##### 结尾的 /+ 表示在原基础上追加，而不是覆盖
  speller/algebra/+:
### 模糊音
    # 声母
    - derive/^([zcs])h/$1/          # zh* ch* sh* 派生出 z* c* s*
    - derive/^([zcs])([^h])/$1h$2/  # z* c* s*    派生出 zh* ch* sh*
    # - derive/^l/n/  # 解释：为 l 开头的拼写派生出 n 开头，即 nai 也可以输出 lai（来、莱、赖……）
    # - derive/^n/l/  #      lai 可输出 nai（奶、乃、奈……）。 可以单向或成对儿启用模糊音
    # - derive/^f/h/
    # - derive/^h/f/
    # - derive/^l/r/
    # - derive/^r/l/
    # - derive/^g/k/
    # - derive/^k/g/
    # 韵母
    - derive/ang$/an/
    - derive/an$/ang/
    - derive/eng$/en/
    - derive/en$/eng/
    - derive/in$/ing/
    - derive/ing$/in/
    # - derive/ian$/iang/
    # - derive/iang$/ian/
    - derive/uan$/uang/
    - derive/uang$/uan/
    # - derive/ai$/an/
    # - derive/an$/ai/
    # - derive/ong$/un/
    # - derive/un$/ong/
    # - derive/ong$/on/
    # - derive/iong$/un/
    # - derive/un$/iong/
    # - derive/ong$/eng/
    # - derive/eng$/ong/
    # 拼音音节
    # - derive/^fei$/hui/
    # - derive/^hui$/fei/
    # - derive/^hu$/fu/
    # - derive/^fu$/hu/
    # - derive/^wang$/huang/
    # - derive/^huang$/wang/
